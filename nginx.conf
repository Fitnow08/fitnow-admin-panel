server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip для текстовых ассетов
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Хешированные ассеты Vite — кешируем надолго
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: все неизвестные пути отдаём index.html (react-router v7)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
